                                        {/* Cuerpo Acordeón */}
                                        {isExpanded && (
                                            <div className="animate-in bg-slate-50/50">
                                                <div className="p-6 grid grid-cols-2 md:grid-cols-4 gap-4">
                                                    <div>
                                                        <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1 flex items-center gap-1"><Icon name="calendar" size={10}/> Vencimiento</p>
                                                        <p className={`text-sm font-black ${expired && !isSuspended ? 'text-orange-600' : 'text-slate-700'}`}>{t.subscriptionEndDate || 'N/D'}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1 flex items-center gap-1"><Icon name="calendar" size={10}/> Registrado</p>
                                                        <p className="text-sm font-black text-slate-700">{formatDate(t.createdAt)}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">Cédula</p>
                                                        <p className="text-sm font-black text-slate-700">{t.cedula || 'N/D'}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">WhatsApp</p>
                                                        <p className="text-sm font-black text-slate-700">{t.phone || 'N/D'}</p>
                                                    </div>
                                                    
                                                    <div className="bg-white p-3 rounded-xl border border-slate-200 text-center shadow-sm">
                                                        <p className="text-[9px] font-black uppercase text-purple-500 tracking-widest mb-0.5">Rutas Máx.</p>
                                                        <p className="font-black text-lg text-slate-800">{t.maxRoutes || 2}</p>
                                                    </div>
                                                    <div className="bg-white p-3 rounded-xl border border-slate-200 text-center shadow-sm">
                                                        <p className="text-[9px] font-black uppercase text-amber-500 tracking-widest mb-0.5">Cobradores</p>
                                                        <p className="font-black text-lg text-slate-800">{t.maxCobradores || 3}</p>
                                                    </div>
                                                </div>

                                                {/* Pie Tarjeta (Acciones) */}
                                                <div className="p-4 bg-white border-t border-slate-100 flex flex-col sm:flex-row gap-3">
                                                    <button onClick={handleWhatsApp} className="flex-1 py-3.5 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-xl font-black text-[11px] uppercase tracking-widest hover:bg-emerald-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                                                        <Icon name="message-circle" size={16} /> Notificar WhatsApp
                                                    </button>
                                                    <button onClick={() => openManageModal(t)} className="flex-1 py-3.5 bg-slate-800 text-white rounded-xl font-black text-[11px] uppercase tracking-widest hover:bg-indigo-600 active:scale-95 transition-all shadow-md">
                                                        Administrar Licencia
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                            
                        {filteredTenants.length === 0 && (
                            <div className="text-center py-20 border border-slate-200 border-dashed rounded-[3rem] bg-white shadow-sm mt-6">
                                <Icon name="search" size={48} className="text-slate-200 mx-auto mb-4"/>
                                <h3 className="text-lg font-black text-slate-700 mb-1">No hay resultados</h3>
                                <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Intenta buscar con otros filtros o palabras.</p>
                            </div>
                        )}
                    </main>

                    {/* FAB CREAR */}
                    <button onClick={() => setShowCreateModal(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl shadow-indigo-500/50 flex items-center justify-center hover:scale-105 hover:-translate-y-1 active:scale-95 transition-all z-20 border-4 border-white">
                        <Icon name="plus" size={28}/>
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
