<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectAdmin - Centro de Mando</title>

    <!-- PWA -->
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ConnectAdmin">
    <link id="dynamic-manifest" rel="manifest">
    
    <script>
        const manifestData = {
            name: "ConnectAdmin Manager",
            short_name: "ConnectAdmin",
            start_url: window.location.href.split('?')[0].split('#')[0],
            display: "standalone",
            background_color: "#f8fafc",
            theme_color: "#f8fafc",
            icons: [
                { src: "https://raw.githubusercontent.com/geudri98-png/Connect-prestamos/23ac554dea034e3dc9675fe2abffa052d83ad021/connectprestamos%20logopng%20(1).png", sizes: "192x192", type: "image/png", purpose: "any" },
                { src: "https://raw.githubusercontent.com/geudri98-png/Connect-prestamos/23ac554dea034e3dc9675fe2abffa052d83ad021/connectprestamos%20logopng%20(1).png", sizes: "512x512", type: "image/png", purpose: "any" }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
        document.getElementById('dynamic-manifest').href = URL.createObjectURL(manifestBlob);
    </script>

    <!-- Tailwind & React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
        .heading-font { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDid8PFmp7fKbLjFSn7mzMcrIfDgjEGwLM",
            authDomain: "connect-prestamos.firebaseapp.com",
            projectId: "connect-prestamos",
            storageBucket: "connect-prestamos.firebasestorage.app",
            messagingSenderId: "685856835997",
            appId: "1:685856835997:web:1d68dc29b9268c656a0774",
            measurementId: "G-5VFZ5ZCBYZ"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                "server": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>,
                "users": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                "plus": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                "x": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                "power": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
                "database": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
                "search": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                "shield": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                "settings": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                "lock": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
                "mail": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
                "user-check": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>,
                "map": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
                "calendar": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                "trash": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                "download": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                "chevron-down": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"/></svg>
            };
            return <span className={`inline-flex items-center justify-center ${className}`}>{icons[name]}</span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [notification, setNotification] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            
            // Tenants
            const [tenants, setTenants] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('all'); // all, active, expired, suspended
            
            // Configuración Global
            const [masterEmail, setMasterEmail] = useState('adminconnect@hotmail.com');
            const [whatsappTemplate, setWhatsappTemplate] = useState('');
            
            // Modales
            const [showCreateModal, setShowCreateModal] = useState(false);
            const [selectedTenant, setSelectedTenant] = useState(null);
            const [tenantSize, setTenantSize] = useState(null);
            const [tenantCobradores, setTenantCobradores] = useState([]);
            const [loadingCobradores, setLoadingCobradores] = useState(false);
            const [expandedClient, setExpandedClient] = useState(null);
            
            const [showSettingsModal, setShowSettingsModal] = useState(false);

            // Formularios
            const [newAccount, setNewAccount] = useState({ name: '', cedula: '', phone: '', email: '', password: '', companyName: '', days: 30, maxRoutes: 2, maxCobradores: 3 });
            const [editDays, setEditDays] = useState(0);
            const [editRoutes, setEditRoutes] = useState(2);
            const [editCobradores, setEditCobradores] = useState(3);
            const [editName, setEditName] = useState('');
            const [editCompany, setEditCompany] = useState('');
            const [editCedula, setEditCedula] = useState('');
            const [editPhone, setEditPhone] = useState('');
            const [settingsForm, setSettingsForm] = useState({ newPassword: '', newEmail: '', whatsappTemplate: '' });
            const [showClientData, setShowClientData] = useState(false);
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', action: null, type: 'danger' });

            const showNotify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 4000); };

            useEffect(() => {
                let unsubTenants = null;

                const checkAuthAndLoad = async (usr) => {
                    if (usr) {
                        let currentMasterEmail = 'adminconnect@hotmail.com';
                        let currentTemplate = 'Hola *{nombre}*, tu licencia está activa hasta el *{fecha}*.\n\nRutas disponibles: *{rutas}*\nCobradores: *{cobradores}*\n\n💳 Para subir de límite o renovar depositar a:\nBanco x: 00000';
                        try {
                            const doc = await db.collection('system').doc('admin_config').get();
                            if (doc.exists) {
                                if (doc.data().masterEmail) currentMasterEmail = doc.data().masterEmail;
                                if (doc.data().whatsappTemplate) currentTemplate = doc.data().whatsappTemplate;
                                setMasterEmail(currentMasterEmail);
                                setWhatsappTemplate(currentTemplate);
                                setSettingsForm(prev => ({...prev, whatsappTemplate: currentTemplate}));
                            } else {
                                await db.collection('system').doc('admin_config').set({ masterEmail: currentMasterEmail, whatsappTemplate: currentTemplate }, { merge: true });
                                setWhatsappTemplate(currentTemplate);
                                setSettingsForm(prev => ({...prev, whatsappTemplate: currentTemplate}));
                            }
                        } catch (error) {
                            console.log("No se pudo leer la config global, usando default.");
                        }

                        if (usr.email === currentMasterEmail || usr.email === 'adminconnect@hotmail.com') {
                            setUser(usr);
                            setView('dashboard');
                            
                            if (unsubTenants) unsubTenants();
                            unsubTenants = db.collection('users').where('role', '==', 'admin').onSnapshot(snap => {
                                const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                // Ordenar por fecha de creación (más recientes primero)
                                data.sort((a, b) => {
                                    const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
                                    const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
                                    return dateB - dateA;
                                });
                                setTenants(data);
                            }, error => {
                                console.error("Error en snapshot:", error);
                                showNotify("Error de permisos. Revisa las reglas de Firestore.");
                            });
                        } else {
                            auth.signOut();
                            showNotify("Acceso Denegado. Esta cuenta no es de Súper Administrador.");
                        }
                    } else {
                        setUser(null);
                        setView('login');
                        if (unsubTenants) {
                            unsubTenants();
                            unsubTenants = null;
                        }
                    }
                };

                const unsubscribe = auth.onAuthStateChanged(checkAuthAndLoad);
                
                return () => {
                    unsubscribe();
                    if (unsubTenants) unsubTenants();
                };
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsProcessing(true);
                const email = e.target.email.value;
                const pass = e.target.password.value;

                try {
                    await auth.signInWithEmailAndPassword(email, pass);
                } catch (error) {
                    if (email === masterEmail && (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password')) {
                        try {
                            await auth.createUserWithEmailAndPassword(email, pass);
                            showNotify("Cuenta Maestra creada e iniciada exitosamente.");
                        } catch (createError) {
                            if (createError.code === 'auth/email-already-in-use') showNotify("Contraseña incorrecta.");
                            else showNotify("Error al auto-crear la cuenta: " + createError.message);
                        }
                    } else {
                        showNotify("Credenciales incorrectas o sin permisos.");
                    }
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleUpdateMasterEmail = async () => {
                if(!settingsForm.newEmail) return;
                setIsProcessing(true);
                try {
                    await auth.currentUser.updateEmail(settingsForm.newEmail);
                    await db.collection('system').doc('admin_config').set({ masterEmail: settingsForm.newEmail }, { merge: true });
                    setMasterEmail(settingsForm.newEmail);
                    showNotify("Correo maestro actualizado correctamente.");
                    setSettingsForm({...settingsForm, newEmail: ''});
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar para cambiar tu correo.");
                    else showNotify("Error: " + error.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleUpdatePassword = async () => {
                if(!settingsForm.newPassword || settingsForm.newPassword.length < 6) return showNotify("La contraseña debe tener al menos 6 caracteres");
                setIsProcessing(true);
                try {
                    await auth.currentUser.updatePassword(settingsForm.newPassword);
                    showNotify("Contraseña de ConnectAdmin actualizada.");
                    setSettingsForm({...settingsForm, newPassword: ''});
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar para cambiar tu contraseña.");
                    else showNotify("Error: " + error.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleUpdateTemplate = async () => {
                setIsProcessing(true);
                try {
                    await db.collection('system').doc('admin_config').set({ whatsappTemplate: settingsForm.whatsappTemplate }, { merge: true });
                    setWhatsappTemplate(settingsForm.whatsappTemplate);
                    showNotify("Plantilla de WhatsApp actualizada.");
                } catch (error) {
                    showNotify("Error al guardar: " + error.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleCreateTenant = async (e) => {
                e.preventDefault();
                setIsProcessing(true);
                let tempApp = null;
                try {
                    tempApp = firebase.initializeApp(firebaseConfig, "TempApp_" + Date.now());
                    await tempApp.auth().setPersistence('none');
                    const res = await tempApp.auth().createUserWithEmailAndPassword(newAccount.email, newAccount.password);
                    
                    const endDate = new Date();
                    endDate.setDate(endDate.getDate() + parseInt(newAccount.days));

                    await db.collection('users').doc(res.user.uid).set({
                        role: 'admin',
                        name: newAccount.name,
                        cedula: newAccount.cedula,
                        phone: newAccount.phone,
                        email: newAccount.email,
                        companyName: newAccount.companyName,
                        subscriptionEndDate: endDate.toISOString().split('T')[0],
                        maxRoutes: parseInt(newAccount.maxRoutes),
                        maxCobradores: parseInt(newAccount.maxCobradores),
                        planStatus: 'active',
                        routes: ['General'],
                        historicalGains: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    showNotify("¡Cuenta de cliente creada con éxito!");
                    setShowCreateModal(false);
                    setNewAccount({ name: '', cedula: '', phone: '', email: '', password: '', companyName: '', days: 30, maxRoutes: 2, maxCobradores: 3 });
                } catch (error) {
                    showNotify("Error al crear: " + error.message);
                } finally {
                    if (tempApp) {
                        await tempApp.auth().signOut().catch(e=>e);
                        await tempApp.delete().catch(e=>e);
                    }
                    setIsProcessing(false);
                }
            };

            const calculateTenantSize = async (tenantId) => {
                setIsProcessing(true);
                setTenantSize("Calculando...");
                try {
                    const clientsSnap = await db.collection('users').doc(tenantId).collection('clients').get();
                    const clientsCount = clientsSnap.size;
                    const gainsSnap = await db.collection('users').doc(tenantId).collection('gains').get();
                    const gainsCount = gainsSnap.size;

                    const estimatedKB = (clientsCount * 5) + (gainsCount * 1);
                    const resultStr = estimatedKB > 1024 ? (estimatedKB / 1024).toFixed(2) + " MB" : estimatedKB.toFixed(2) + " KB";
                    setTenantSize(`${clientsCount} Clientes | ${gainsCount} Recibos | Peso: ${resultStr}`);
                } catch (error) {
                    setTenantSize("Error al calcular");
                } finally {
                    setIsProcessing(false);
                }
            };

            const openManageModal = (tenant) => {
                setSelectedTenant(tenant);
                setEditRoutes(tenant.maxRoutes || 2);
                setEditCobradores(tenant.maxCobradores || 3);
                setEditDays(0);
                setEditName(tenant.name || '');
                setEditCompany(tenant.companyName || '');
                setEditCedula(tenant.cedula || '');
                setEditPhone(tenant.phone || '');
                setTenantSize(null);
                setTenantCobradores([]);
                setShowClientData(false);
                
                setLoadingCobradores(true);
                db.collection('users')
                  .where('adminUid', '==', tenant.id)
                  .where('role', '==', 'cobrador')
                  .get()
                  .then(snap => {
                      setTenantCobradores(snap.docs.map(doc => doc.data()));
                      setLoadingCobradores(false);
                  })
                  .catch(err => {
                      console.error("Error buscando cobradores:", err);
                      setLoadingCobradores(false);
                  });
            };

            const handleUpdateSubscription = async () => {
                setIsProcessing(true);
                try {
                    const currentEndDate = new Date(selectedTenant.subscriptionEndDate || new Date());
                    const addedDays = parseInt(editDays) || 0;
                    
                    const today = new Date();
                    let newDate = currentEndDate;
                    
                    if (addedDays > 0) {
                        if (currentEndDate < today) newDate = today;
                        newDate.setDate(newDate.getDate() + addedDays);
                    }

                    await db.collection('users').doc(selectedTenant.id).update({
                        subscriptionEndDate: newDate.toISOString().split('T')[0],
                        maxRoutes: parseInt(editRoutes),
                        maxCobradores: parseInt(editCobradores),
                        planStatus: 'active'
                    });

                    showNotify("Licencia actualizada correctamente");
                    setSelectedTenant(null);
                } catch (error) {
                    showNotify("Error al actualizar");
                } finally {
                    setIsProcessing(false);
                }
            };

            const toggleStatus = () => {
                setConfirmModal({
                    isOpen: true,
                    title: selectedTenant.planStatus === 'active' ? 'Suspender Cuenta' : 'Reactivar Cuenta',
                    message: `¿Seguro que deseas ${selectedTenant.planStatus === 'active' ? 'SUSPENDER' : 'ACTIVAR'} la cuenta de ${selectedTenant.email}?`,
                    type: selectedTenant.planStatus === 'active' ? 'danger' : 'success',
                    action: async () => {
                        setIsProcessing(true);
                        try {
                            const newStatus = selectedTenant.planStatus === 'active' ? 'suspended' : 'active';
                            await db.collection('users').doc(selectedTenant.id).update({ planStatus: newStatus });
                            showNotify(`Cuenta ${newStatus === 'active' ? 'Activada' : 'Suspendida'}`);
                            setSelectedTenant({ ...selectedTenant, planStatus: newStatus });
                        } catch (e) {
                            showNotify("Error cambiando estado");
                        } finally {
                            setIsProcessing(false);
                            setConfirmModal({isOpen: false});
                        }
                    }
                });
            };

            const handleUpdateProfile = async () => {
                setIsProcessing(true);
                try {
                    await db.collection('users').doc(selectedTenant.id).update({
                        name: editName,
                        companyName: editCompany,
                        cedula: editCedula,
                        phone: editPhone
                    });
                    showNotify("Perfil actualizado correctamente");
                    setSelectedTenant({...selectedTenant, name: editName, companyName: editCompany, cedula: editCedula, phone: editPhone});
                } catch (error) {
                    showNotify("Error al actualizar perfil");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleBackupTenant = async () => {
                setIsProcessing(true);
                try {
                    const clientsSnap = await db.collection('users').doc(selectedTenant.id).collection('clients').get();
                    const gainsSnap = await db.collection('users').doc(selectedTenant.id).collection('gains').get();
                    
                    const backupData = {
                        account_info: selectedTenant,
                        exported_at: new Date().toISOString(),
                        clients: clientsSnap.docs.map(d => ({ id: d.id, ...d.data() })),
                        gains: gainsSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                    };
                    
                    const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const dateStr = new Date().toISOString().split('T')[0];
                    a.download = `Backup_${selectedTenant.companyName || selectedTenant.name}_${dateStr}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    showNotify("¡Backup de datos descargado correctamente!");
                } catch (e) {
                    console.error("Error al generar backup:", e);
                    showNotify("Error al generar backup: " + e.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleDeleteTenant = () => {
                setConfirmModal({
                    isOpen: true,
                    title: 'Eliminar Cliente Totalmente',
                    message: `¿Seguro que deseas ELIMINAR a ${selectedTenant.email} de la base de datos?\n\n¡ADVERTENCIA CRÍTICA! Se borrarán todos sus datos, clientes, cobradores y ganancias del sistema de forma permanente.`,
                    type: 'danger',
                    action: async () => {
                        setIsProcessing(true);
                        try {
                            const tenantId = selectedTenant.id;

                            // 1. Borrar todos los clientes (subcolección)
                            const clientsSnap = await db.collection('users').doc(tenantId).collection('clients').get();
                            await Promise.all(clientsSnap.docs.map(doc => doc.ref.delete()));
                            
                            // 2. Borrar todas las ganancias (subcolección)
                            const gainsSnap = await db.collection('users').doc(tenantId).collection('gains').get();
                            await Promise.all(gainsSnap.docs.map(doc => doc.ref.delete()));

                            // 3. Borrar todos los cobradores asociados a este administrador
                            const cobradoresSnap = await db.collection('users').where('adminUid', '==', tenantId).get();
                            await Promise.all(cobradoresSnap.docs.map(doc => doc.ref.delete()));

                            // 4. Finalmente, borrar el documento principal del cliente
                            await db.collection('users').doc(tenantId).delete();
                            
                            showNotify("Cliente y todos sus datos eliminados del sistema.");
                            setSelectedTenant(null);
                        } catch (e) {
                            console.error("Error al eliminar:", e);
                            showNotify("Error al eliminar cliente: " + e.message);
                        } finally {
                            setIsProcessing(false);
                            setConfirmModal({isOpen: false});
                        }
                    }
                });
            };

            const handleSendPasswordReset = async (email) => {
                setIsProcessing(true);
                try {
                    await auth.sendPasswordResetEmail(email);
                    showNotify("¡Enlace enviado al cliente!");
                } catch (error) {
                    showNotify("Error: " + error.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const isExpired = (dateStr) => {
                if(!dateStr) return true;
                const end = new Date(dateStr);
                const today = new Date();
                today.setHours(0,0,0,0);
                return end < today;
            };

            const formatDate = (dateObj) => {
                if (!dateObj) return 'N/D';
                const d = dateObj.toDate ? dateObj.toDate() : new Date(dateObj);
                return d.toLocaleDateString('es-DO', { day: '2-digit', month: 'short', year: 'numeric' });
            };

            // Filtrado Compuesto (Búsqueda + Pestañas de Estado)
            const filteredTenants = useMemo(() => {
                const query = searchQuery.toLowerCase().trim();
                return tenants.filter(t => {
                    // 1. Filtro de Búsqueda
                    const matchesSearch = 
                        t.name?.toLowerCase().includes(query) || 
                        t.companyName?.toLowerCase().includes(query) ||
                        t.email?.toLowerCase().includes(query) ||
                        t.cedula?.toLowerCase().includes(query) ||
                        t.phone?.toLowerCase().includes(query);
                    
                    if (!matchesSearch && query !== '') return false;

                    // 2. Filtro de Estado
                    const expired = isExpired(t.subscriptionEndDate);
                    
                    let isExpiringSoon = false;
                    if (!expired && t.subscriptionEndDate) {
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const in5Days = new Date(today);
                        in5Days.setDate(today.getDate() + 5);
                        const end = new Date(t.subscriptionEndDate);
                        end.setHours(0,0,0,0);
                        if (end >= today && end <= in5Days) isExpiringSoon = true;
                    }

                    if (statusFilter === 'all') return true;
                    if (statusFilter === 'active') return t.planStatus === 'active' && !expired;
                    if (statusFilter === 'expiring_soon') return t.planStatus === 'active' && isExpiringSoon;
                    if (statusFilter === 'expired') return t.planStatus === 'active' && expired;
                    if (statusFilter === 'suspended') return t.planStatus === 'suspended';
                    
                    return true;
                });
            }, [tenants, searchQuery, statusFilter]);

            const stats = useMemo(() => {
                let active = 0, expired = 0, suspended = 0, expiringSoon = 0;
                const today = new Date();
                today.setHours(0,0,0,0);
                const in5Days = new Date(today);
                in5Days.setDate(today.getDate() + 5);

                tenants.forEach(t => {
                    if (t.planStatus === 'suspended') suspended++;
                    else if (isExpired(t.subscriptionEndDate)) expired++;
                    else {
                        active++;
                        if (t.subscriptionEndDate) {
                            const end = new Date(t.subscriptionEndDate);
                            end.setHours(0,0,0,0);
                            if (end >= today && end <= in5Days) expiringSoon++;
                        }
                    }
                });
                return { total: tenants.length, active, expired, suspended, expiringSoon };
            }, [tenants]);

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-2xl animate-in z-50">{notification}</div>}
                        
                        <div className="w-full max-w-sm bg-white p-8 rounded-[2rem] text-center shadow-xl border border-slate-200">
                            <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-indigo-100">
                                <Icon name="shield" size={32} />
                            </div>
                            <h1 className="heading-font text-2xl font-black text-slate-800 mb-2">ConnectAdmin</h1>
                            <p className="text-xs text-slate-400 mb-8 font-bold">Acceso exclusivo al sistema</p>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="email" type="email" placeholder="Correo Administrativo" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500 transition-colors" required />
                                <input name="password" type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500 transition-colors" required />
                                <button type="submit" disabled={isProcessing} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-xl font-black shadow-lg shadow-indigo-600/30 active:scale-95 transition-all mt-4 disabled:opacity-50">
                                    {isProcessing ? 'Verificando...' : 'Ingresar al Panel'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 text-slate-800 pb-20 font-sans">
                    {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-2xl animate-in z-50">{notification}</div>}

                    {/* CUSTOM CONFIRM MODAL */}
                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full shadow-2xl animate-in zoom-in-95 border border-slate-200">
                                <h3 className="font-black text-xl text-slate-800 mb-2">{confirmModal.title}</h3>
                                <p className="text-xs text-slate-500 font-bold mb-6 whitespace-pre-line">{confirmModal.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmModal({isOpen: false})} disabled={isProcessing} className="flex-1 p-3.5 bg-slate-100 text-slate-600 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 hover:bg-slate-200 transition-colors disabled:opacity-50">Cancelar</button>
                                    <button onClick={() => confirmModal.action()} disabled={isProcessing} className={`flex-1 p-3.5 text-white rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-colors disabled:opacity-50 ${confirmModal.type === 'danger' ? 'bg-red-600 hover:bg-red-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                        {isProcessing ? '...' : 'Confirmar'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIGURACIONES (SETTINGS) */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in border border-slate-200">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="heading-font text-xl font-black flex items-center gap-2 text-slate-800"><Icon name="settings" className="text-indigo-500"/> Ajustes Globales</h3>
                                    <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full"><Icon name="x"/></button>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                        <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-3 flex items-center gap-2"><Icon name="mail" size={14}/> Cambiar Correo de Acceso</h4>
                                        <p className="text-[10px] text-slate-400 font-bold mb-3">Correo actual: <span className="text-indigo-600">{masterEmail}</span></p>
                                        <div className="flex gap-2">
                                            <input type="email" placeholder="Nuevo correo maestro" value={settingsForm.newEmail} onChange={e=>setSettingsForm({...settingsForm, newEmail: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-xs font-bold text-slate-700" />
                                            <button onClick={handleUpdateMasterEmail} disabled={isProcessing} className="bg-indigo-600 text-white px-4 rounded-xl font-black text-xs active:scale-95 disabled:opacity-50 shadow-md">Guardar</button>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                        <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-3 flex items-center gap-2"><Icon name="lock" size={14}/> Cambiar Contraseña</h4>
                                        <div className="flex gap-2">
                                            <input type="password" placeholder="Nueva contraseña (min 6)" value={settingsForm.newPassword} onChange={e=>setSettingsForm({...settingsForm, newPassword: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-xs font-bold text-slate-700" />
                                            <button onClick={handleUpdatePassword} disabled={isProcessing} className="bg-indigo-600 text-white px-4 rounded-xl font-black text-xs active:scale-95 disabled:opacity-50 shadow-md">Guardar</button>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                        <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-3 flex items-center gap-2"><Icon name="message-circle" size={14}/> Plantilla de WhatsApp</h4>
                                        <p className="text-[9px] text-slate-400 font-bold mb-3">Variables automáticas: <span className="text-indigo-500">{"{nombre}, {empresa}, {fecha}, {rutas}, {cobradores}"}</span></p>
                                        <textarea value={settingsForm.whatsappTemplate} onChange={e=>setSettingsForm({...settingsForm, whatsappTemplate: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-xs font-bold text-slate-700 mb-3" rows="5"></textarea>
                                        <button onClick={handleUpdateTemplate} disabled={isProcessing} className="w-full bg-indigo-600 text-white p-3 rounded-xl font-black text-xs active:scale-95 disabled:opacity-50 shadow-md">Guardar Mensaje</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CREAR CLIENTE */}
                    {showCreateModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-6 animate-in border border-slate-200 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="heading-font text-xl font-black flex items-center gap-2 text-slate-800"><Icon name="plus" className="text-indigo-500"/> Nueva Cuenta</h3>
                                    <button onClick={() => setShowCreateModal(false)} className="text-slate-400 hover:text-slate-600 bg-slate-50 p-2 rounded-full"><Icon name="x"/></button>
                                </div>
                                <form onSubmit={handleCreateTenant} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5"><label className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Nombre Dueño</label>
                                        <input value={newAccount.name} onChange={e=>setNewAccount({...newAccount, name: e.target.value})} type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-slate-800" required/></div>
                                        <div className="space-y-1.5"><label className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Nombre Empresa</label>
                                        <input value={newAccount.companyName} onChange={e=>setNewAccount({...newAccount, companyName: e.target.value})} type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-slate-800" required/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5"><label className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Cédula</label>
                                        <input value={newAccount.cedula} onChange={e=>setNewAccount({...newAccount, cedula: e.target.value})} type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-slate-800" required/></div>
                                        <div className="space-y-1.5"><label className="text-[10px] text-slate-500 font-black uppercase tracking-widest">WhatsApp</label>
                                        <input value={newAccount.phone} onChange={e=>setNewAccount({...newAccount, phone: e.target.value})} type="tel" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-slate-800" required/></div>
                                    </div>
                                    <div className="space-y-1.5"><label className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Correo Acceso</label>
                                    <input value={newAccount.email} onChange={e=>setNewAccount({...newAccount, email: e.target.value})} type="email" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-slate-800" required/></div>
                                    <div className="space-y-1.5"><label className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Contraseña Inicial</label>
                                    <input value={newAccount.password} onChange={e=>setNewAccount({...newAccount, password: e.target.value})} type="password" minLength="6" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-slate-800" required/></div>
                                    
                                    <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                                        <div className="space-y-1.5"><label className="text-[10px] text-indigo-500 font-black uppercase tracking-widest">Días de Plan</label>
                                        <input value={newAccount.days} onChange={e=>setNewAccount({...newAccount, days: e.target.value})} type="number" className="w-full p-3 bg-indigo-50 border border-indigo-100 rounded-xl outline-none focus:border-indigo-500 text-sm text-indigo-700 font-black text-center" required/></div>
                                        <div className="space-y-1.5"><label className="text-[10px] text-purple-500 font-black uppercase tracking-widest">Límite Rutas</label>
                                        <input value={newAccount.maxRoutes} onChange={e=>setNewAccount({...newAccount, maxRoutes: e.target.value})} type="number" className="w-full p-3 bg-purple-50 border border-purple-100 rounded-xl outline-none focus:border-purple-500 text-sm text-purple-700 font-black text-center" required/></div>
                                        <div className="space-y-1.5 col-span-2"><label className="text-[10px] text-amber-600 font-black uppercase tracking-widest">Límite Cobradores</label>
                                        <input value={newAccount.maxCobradores} onChange={e=>setNewAccount({...newAccount, maxCobradores: e.target.value})} type="number" className="w-full p-3 bg-amber-50 border border-amber-100 rounded-xl outline-none focus:border-amber-500 text-sm text-amber-700 font-black text-center" required/></div>
                                    </div>

                                    <button type="submit" disabled={isProcessing} className="w-full bg-slate-800 text-white p-4 rounded-xl font-black mt-6 shadow-xl active:scale-95 transition-all disabled:opacity-50">
                                        {isProcessing ? 'Creando e Instalando Base de Datos...' : 'Crear Entorno y Entregar Cuenta'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL GESTIONAR CLIENTE EXISTENTE */}
                    {selectedTenant && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-6 animate-in border border-slate-200 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                                <div className="flex justify-between items-start mb-6">
                                    <div className="flex-1 pr-2">
                                        <h3 className="heading-font text-lg font-black text-slate-800 break-all leading-tight"><Icon name="mail" size={18} className="inline text-indigo-500 mr-1.5 mb-1"/>{selectedTenant.email}</h3>
                                        <p className="text-[10px] uppercase tracking-widest text-slate-500 font-black mt-1">Empresa: {selectedTenant.companyName || selectedTenant.name}</p>
                                    </div>
                                    <button onClick={() => setSelectedTenant(null)} className="text-slate-400 bg-slate-50 p-2 rounded-full hover:text-slate-600 flex-shrink-0"><Icon name="x"/></button>
                                </div>

                                {/* ESTADO ACTUAL */}
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 mb-6 shadow-inner">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[10px] uppercase font-black text-slate-400 tracking-widest">Estado de Licencia</span>
                                        <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-md border ${selectedTenant.planStatus === 'suspended' ? 'bg-red-50 text-red-600 border-red-100' : (isExpired(selectedTenant.subscriptionEndDate) ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100')}`}>
                                            {selectedTenant.planStatus === 'suspended' ? 'Suspendido' : (isExpired(selectedTenant.subscriptionEndDate) ? 'Vencido' : 'Activo')}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[10px] uppercase font-black text-slate-400 tracking-widest">Fecha de Corte</span>
                                        <span className="font-black text-sm text-slate-700">{selectedTenant.subscriptionEndDate || 'N/D'}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-t border-slate-200 pt-3 mt-3">
                                        <span className="text-[10px] uppercase font-black text-slate-400 tracking-widest">Acceso Cliente</span>
                                        <button onClick={() => handleSendPasswordReset(selectedTenant.email)} className="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-100 px-3 py-1.5 rounded-lg font-black transition-colors shadow-sm active:scale-95">Resetear Contraseña</button>
                                    </div>
                                </div>

                                {/* LISTA DE COBRADORES DEL CLIENTE */}
                                <div className="mb-6 bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 flex items-center gap-1"><Icon name="user-check" size={14}/> Equipo del Cliente</h4>
                                    {loadingCobradores ? (
                                        <p className="text-[10px] font-bold text-slate-400 text-center animate-pulse">Consultando...</p>
                                    ) : tenantCobradores.length > 0 ? (
                                        <div className="space-y-2">
                                            {tenantCobradores.map((cob, idx) => (
                                                <div key={idx} className="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                                                    <span className="text-xs font-bold text-slate-700 truncate max-w-[120px]">{cob.name}</span>
                                                    <span className="text-[9px] font-bold text-slate-400 truncate max-w-[110px]">{cob.email}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-[10px] font-bold text-slate-400 text-center">Sin empleados registrados.</p>
                                    )}
                                </div>

                                {/* CONSUMO, RECURSOS Y BACKUP */}
                                <div className="mb-6 grid grid-cols-2 gap-2">
                                    <button onClick={() => calculateTenantSize(selectedTenant.id)} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-600 flex flex-col items-center justify-center gap-1 hover:bg-slate-100 transition-colors active:scale-95 shadow-sm">
                                        <Icon name="database" size={16}/> Calcular Peso
                                    </button>
                                    <button onClick={handleBackupTenant} className="w-full bg-indigo-50 border border-indigo-100 p-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-indigo-600 flex flex-col items-center justify-center gap-1 hover:bg-indigo-100 transition-colors active:scale-95 shadow-sm">
                                        <Icon name="download" size={16}/> Respaldar (JSON)
                                    </button>
                                    {tenantSize && (
                                        <div className="col-span-2 mt-1 p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-center">
                                            <p className="text-[10px] text-indigo-600 font-black uppercase tracking-widest">{tenantSize}</p>
                                        </div>
                                    )}
                                </div>

                                {/* EDITAR PERFIL BÁSICO (ACORDEÓN) */}
                                <button onClick={() => setShowClientData(!showClientData)} className="w-full flex items-center justify-between border-t border-slate-200 pt-4 pb-2 text-left mb-2">
                                    <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Datos del Cliente</h4>
                                    <Icon name="chevron-down" size={16} className={`text-slate-400 transform transition-transform ${showClientData ? 'rotate-180' : ''}`} />
                                </button>
                                
                                {showClientData && (
                                    <div className="space-y-3 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200 animate-in">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Nombre Dueño</label>
                                            <input type="text" value={editName} onChange={e=>setEditName(e.target.value)} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-500 text-slate-700" /></div>
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Nombre Empresa</label>
                                            <input type="text" value={editCompany} onChange={e=>setEditCompany(e.target.value)} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-500 text-slate-700" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Cédula</label>
                                            <input type="text" value={editCedula} onChange={e=>setEditCedula(e.target.value)} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-500 text-slate-700" /></div>
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400 tracking-widest">WhatsApp</label>
                                            <input type="tel" value={editPhone} onChange={e=>setEditPhone(e.target.value)} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-500 text-slate-700" /></div>
                                        </div>
                                        <button onClick={handleUpdateProfile} disabled={isProcessing || (editName===selectedTenant.name && editCompany===selectedTenant.companyName && editCedula===selectedTenant.cedula && editPhone===selectedTenant.phone)} className="w-full mt-2 bg-indigo-100 text-indigo-700 p-2.5 rounded-lg font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform disabled:opacity-50">
                                            Guardar Cambios de Perfil
                                        </button>
                                    </div>
                                )}

                                {/* FORMULARIO ACTUALIZAR */}
                                <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 ml-1 border-t border-slate-200 pt-4">Configurar Licencia</h4>
                                <div className="space-y-4 mb-6">
                                    <div className="space-y-1.5 bg-slate-50 p-3 rounded-xl border border-slate-200">
                                        <label className="text-[10px] text-slate-500 font-black uppercase tracking-widest flex justify-between mb-2">
                                            <span>Renovar / Sumar Días (Manual)</span>
                                        </label>
                                        <div className="flex gap-2">
                                            <button onClick={()=>setEditDays(Math.max(0, parseInt(editDays || 0)-1))} className="w-10 bg-white border border-slate-200 rounded-lg text-slate-600 font-black active:scale-95 shadow-sm">-</button>
                                            <input type="number" value={editDays} onChange={e=>setEditDays(e.target.value)} className="flex-1 p-3 bg-white border border-slate-200 rounded-lg text-center font-black outline-none text-indigo-600 focus:border-indigo-500" />
                                            <button onClick={()=>setEditDays(parseInt(editDays || 0)+1)} className="w-10 bg-white border border-slate-200 rounded-lg text-slate-600 font-black active:scale-95 shadow-sm">+</button>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] text-slate-500 font-black uppercase tracking-widest flex justify-between">
                                                <span>Límite Rutas</span>
                                            </label>
                                            <div className="flex gap-1">
                                                <button onClick={()=>setEditRoutes(Math.max(1, editRoutes-1))} className="w-8 h-8 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-black active:scale-95">-</button>
                                                <input type="number" value={editRoutes} readOnly className="flex-1 bg-slate-50 border border-slate-200 rounded-lg text-center font-black outline-none text-purple-600 w-12" />
                                                <button onClick={()=>setEditRoutes(editRoutes+1)} className="w-8 h-8 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-black active:scale-95">+</button>
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] text-slate-500 font-black uppercase tracking-widest flex justify-between">
                                                <span>Lím. Cobradores</span>
                                            </label>
                                            <div className="flex gap-1">
                                                <button onClick={()=>setEditCobradores(Math.max(0, editCobradores-1))} className="w-8 h-8 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-black active:scale-95">-</button>
                                                <input type="number" value={editCobradores} readOnly className="flex-1 bg-slate-50 border border-slate-200 rounded-lg text-center font-black outline-none text-amber-600 w-12" />
                                                <button onClick={()=>setEditCobradores(editCobradores+1)} className="w-8 h-8 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-black active:scale-95">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3">
                                    <div className="flex gap-2">
                                        <button onClick={toggleStatus} disabled={isProcessing} className={`flex-[0.8] p-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all border shadow-sm ${selectedTenant.planStatus === 'active' ? 'bg-orange-50 text-orange-600 border-orange-200 hover:bg-orange-100' : 'bg-emerald-50 text-emerald-600 border-emerald-200 hover:bg-emerald-100'}`}>
                                            {selectedTenant.planStatus === 'active' ? 'Suspender' : 'Reactivar'}
                                        </button>
                                        <button onClick={handleUpdateSubscription} disabled={isProcessing || (editDays == 0 && editRoutes == (selectedTenant.maxRoutes || 2) && editCobradores == (selectedTenant.maxCobradores || 3))} className="flex-1 bg-slate-800 text-white p-4 rounded-xl font-black text-[11px] uppercase tracking-widest shadow-xl active:scale-95 disabled:opacity-50">
                                            Guardar Licencia
                                        </button>
                                    </div>
                                    <button onClick={handleDeleteTenant} disabled={isProcessing} className="w-full p-3 bg-red-50 text-red-600 border border-red-200 rounded-xl hover:bg-red-100 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest mt-1" title="Eliminar Base de Datos permanentemente">
                                        <Icon name="trash" size={14}/> Eliminar Cliente Totalmente
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER PRINCIPAL */}
                    <header className="bg-white px-6 py-8 sticky top-0 z-30 border-b border-slate-200 shadow-sm">
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-indigo-600 rounded-[1.2rem] flex items-center justify-center text-white shadow-lg shadow-indigo-200"><Icon name="server" size={28}/></div>
                                <div>
                                    <h2 className="heading-font text-2xl font-black leading-tight text-slate-800">SaaS Panel</h2>
                                    <p className="text-[11px] text-indigo-500 uppercase tracking-widest font-black mt-0.5">Centro de Control</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowSettingsModal(true)} className="w-12 h-12 bg-slate-50 border border-slate-200 rounded-full flex items-center justify-center text-slate-500 hover:text-indigo-600 transition-colors shadow-sm active:scale-95"><Icon name="settings" size={20}/></button>
                                <button onClick={() => auth.signOut()} className="w-12 h-12 bg-slate-50 border border-slate-200 rounded-full flex items-center justify-center text-slate-500 hover:text-red-500 transition-colors shadow-sm active:scale-95"><Icon name="power" size={20}/></button>
                            </div>
                        </div>

                        {/* MÉTRICAS */}
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                            <div className="bg-white border border-slate-200 p-4 rounded-2xl text-center shadow-sm hover:border-indigo-300 transition-colors cursor-pointer" onClick={()=>setStatusFilter('all')}>
                                <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Cuentas</p>
                                <p className="text-3xl font-black text-slate-800">{stats.total}</p>
                            </div>
                            <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl text-center shadow-sm hover:border-emerald-300 transition-colors cursor-pointer" onClick={()=>setStatusFilter('active')}>
                                <p className="text-[10px] text-emerald-600 font-black uppercase tracking-widest mb-1">Al Día</p>
                                <p className="text-3xl font-black text-emerald-600">{stats.active}</p>
                            </div>
                            <div className="bg-amber-50 border border-amber-100 p-4 rounded-2xl text-center shadow-sm hover:border-amber-300 transition-colors cursor-pointer" onClick={()=>setStatusFilter('expiring_soon')}>
                                <p className="text-[10px] text-amber-600 font-black uppercase tracking-widest mb-1 flex items-center justify-center gap-1"><Icon name="alert-triangle" size={12}/> Por Vencer</p>
                                <p className="text-3xl font-black text-amber-600">{stats.expiringSoon}</p>
                            </div>
                            <div className="bg-red-50 border border-red-100 p-4 rounded-2xl text-center shadow-sm hover:border-red-300 transition-colors cursor-pointer" onClick={()=>setStatusFilter('expired')}>
                                <p className="text-[10px] text-red-600 font-black uppercase tracking-widest mb-1 flex items-center justify-center gap-1"><Icon name="calendar" size={12}/> Vencidos</p>
                                <p className="text-3xl font-black text-red-600">{stats.expired}</p>
                            </div>
                        </div>
                    </header>

                    <main className="p-6 max-w-5xl mx-auto">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                            <h3 className="text-base font-black text-slate-800 uppercase tracking-widest flex items-center gap-2"><Icon name="users" size={20} className="text-indigo-500"/> Cartera de Clientes</h3>
                            
                            {/* PESTAÑAS DE FILTRO RÁPIDO */}
                            <div className="flex bg-white rounded-xl p-1 border border-slate-200 shadow-sm w-full sm:w-auto overflow-x-auto no-scrollbar">
                                <button onClick={() => setStatusFilter('all')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${statusFilter === 'all' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>Todos</button>
                                <button onClick={() => setStatusFilter('active')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${statusFilter === 'active' ? 'bg-emerald-100 text-emerald-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>Activos</button>
                                <button onClick={() => setStatusFilter('expiring_soon')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${statusFilter === 'expiring_soon' ? 'bg-amber-100 text-amber-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>Por Vencer</button>
                                <button onClick={() => setStatusFilter('expired')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${statusFilter === 'expired' ? 'bg-orange-100 text-orange-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>Vencidos</button>
                                <button onClick={() => setStatusFilter('suspended')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${statusFilter === 'suspended' ? 'bg-red-100 text-red-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>Susp.</button>
                            </div>
                        </div>

                        {/* BUSCADOR */}
                        <div className="relative mb-8">
                            <Icon name="search" size={18} className="absolute left-5 top-5 text-slate-400" />
                            <input type="text" placeholder="Buscar cliente por correo, empresa, cédula o WhatsApp..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-14 p-5 bg-white border border-slate-200 rounded-[1.5rem] text-sm font-bold text-slate-700 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 shadow-sm transition-all" />
                        </div>

                        {/* LISTA DE CLIENTES ACORDEÓN */}
                        <div className="space-y-4">
                            {filteredTenants.map(t => {
                                const expired = isExpired(t.subscriptionEndDate);
                                const isSuspended = t.planStatus === 'suspended';
                                const isExpanded = expandedClient === t.id;
                                
                                // Determinar Colores de Estado
                                let statusBg = 'bg-emerald-500';
                                let statusText = 'Activo';
                                let borderClass = isExpanded ? 'border-indigo-300 shadow-md' : 'border-slate-200 hover:border-indigo-300';
                                
                                if (isSuspended) {
                                    statusBg = 'bg-red-500';
                                    statusText = 'Suspendido';
                                    borderClass = isExpanded ? 'border-red-400 shadow-md' : 'border-red-200 bg-red-50/30';
                                } else if (expired) {
                                    statusBg = 'bg-orange-500';
                                    statusText = 'Vencido';
                                    borderClass = isExpanded ? 'border-orange-400 shadow-md' : 'border-orange-200 bg-orange-50/30';
                                }

                                const handleWhatsApp = (e) => {
                                    e.stopPropagation();
                                    if (!t.phone) return showNotify("Este cliente no tiene teléfono guardado");
                                    let msg = whatsappTemplate;
                                    msg = msg.replace(/\{nombre\}/g, t.name || '')
                                             .replace(/\{empresa\}/g, t.companyName || '')
                                             .replace(/\{fecha\}/g, t.subscriptionEndDate || 'N/D')
                                             .replace(/\{rutas\}/g, t.maxRoutes || 2)
                                             .replace(/\{cobradores\}/g, t.maxCobradores || 3);
                                    
                                    const phoneNum = t.phone.replace(/\D/g, '');
                                    const finalPhone = phoneNum.length === 10 ? '1' + phoneNum : phoneNum;
                                    window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent(msg)}`, '_blank');
                                };

                                return (
                                    <div key={t.id} className={`bg-white rounded-[2rem] border ${borderClass} transition-all flex flex-col overflow-hidden`}>
                                        
                                        {/* Cabecera Acordeón */}
                                        <div onClick={() => setExpandedClient(isExpanded ? null : t.id)} className="p-6 border-b border-slate-100 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
                                            <div className="flex gap-4 items-center min-w-0 flex-1">
                                                <div className="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-lg bg-indigo-50 text-indigo-600 border border-indigo-100 flex-shrink-0 shadow-sm">
                                                    {t.email ? t.email[0].toUpperCase() : 'C'}
                                                </div>
                                                <div className="min-w-0 pr-4">
                                                    <h4 className="font-black text-base text-slate-800 leading-tight truncate" title={t.email}>{t.email}</h4>
                                                    <p className="text-xs font-bold text-slate-500 mt-1 uppercase tracking-widest truncate">{t.companyName || t.name}</p>
                                                </div>
                                            </div>

                                            <div className="flex items-center gap-3 flex-shrink-0">
                                                <div className="flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-200">
                                                    <div className={`w-2 h-2 rounded-full ${statusBg}`}></div>
                                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-600 hidden sm:inline-block">{statusText}</span>
                                                </div>
                                                <div className={`w-8 h-8 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full transform transition-transform ${isExpanded ? 'rotate-90' : '-rotate-90'}`}>
                                                    <Icon name="arrow-left" size={16}/>
                                                </div>
                                            </div>
                                        </div>
